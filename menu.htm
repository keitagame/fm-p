<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FM SYNTH</title>
    <style>
body {  height: 100vh; background-color: #ffffff; margin: 0; }
        
        
        .piano {
            display: flex;
            position: relative;
          
            padding: 10px;
            border-radius: 8px;
            
            white-space: nowrap;
        }

        /* 白鍵のスタイル */
        .key {
            width: 40px;
            height: 170px;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 0 0 4px 4px;
            cursor: pointer;
            box-sizing: border-box;
            z-index: 1;
        }

        .key:active {
            background-color: #e0e0e0;
        }

        /* 黒鍵のスタイル */
        .key.black {
            width: 24px;
            height: 105px;
            background-color: black;
            border: none;
            margin-left: -12px;
            margin-right: -12px;
            z-index: 2;
        }

        .key.black:active {
            background-color: #444;
        }
          </style>
</head>

<body>
    <div class="piano">
        <!-- ──── 【1オクターブ低い】C3 ～ B3 ──── -->
        <div class="key" data-note="130.81"></div><!-- C3 -->
        <div class="key black" data-note="138.59"></div>
        <div class="key" data-note="146.83"></div><!-- D3 -->
        <div class="key black" data-note="155.56"></div>
        <div class="key" data-note="164.81"></div><!-- E3 -->
        <div class="key" data-note="174.61"></div><!-- F3 -->
        <div class="key black" data-note="185.00"></div>
        <div class="key" data-note="196.00"></div><!-- G3 -->
        <div class="key black" data-note="207.65"></div>
        <div class="key" data-note="220.00"></div><!-- A3 -->
        <div class="key black" data-note="233.08"></div>
        <div class="key" data-note="246.94"></div><!-- B3 -->

        <!-- ──── 【真ん中】C4 ～ B4 ──── -->
        <div class="key" data-note="261.63"></div><!-- C4 -->
        <div class="key black" data-note="277.18"></div>
        <div class="key" data-note="293.66"></div><!-- D4 -->
        <div class="key black" data-note="311.13"></div>
        <div class="key" data-note="329.63"></div><!-- E4 -->
        <div class="key" data-note="349.23"></div><!-- F4 -->
        <div class="key black" data-note="369.99"></div>
        <div class="key" data-note="392.00"></div><!-- G4 -->
        <div class="key black" data-note="415.30"></div>
        <div class="key" data-note="440.00"></div><!-- A4 -->
        <div class="key black" data-note="466.16"></div>
        <div class="key" data-note="493.88"></div><!-- B4 -->

        <!-- ──── 【1オクターブ高い】C5 ～ B5 ──── -->
        <div class="key" data-note="523.25"></div><!-- C5 -->
        <div class="key black" data-note="554.37"></div>
        <div class="key" data-note="587.33"></div><!-- D5 -->
        <div class="key black" data-note="622.25"></div>
        <div class="key" data-note="659.25"></div><!-- E5 -->
        <div class="key" data-note="698.46"></div><!-- F5 -->
        <div class="key black" data-note="739.99"></div>
        <div class="key" data-note="783.99"></div><!-- G5 -->
        <div class="key black" data-note="830.61"></div>
        <div class="key" data-note="880.00"></div><!-- A5 -->
        <div class="key black" data-note="932.33"></div>
        <div class="key" data-note="987.77"></div><!-- B5 -->
    </div>
    <script>
const sampleRate = 44100;
let audioCtx = null;

// 現在選択されているアルゴリズムの番号（1〜4）
// UIのボタンなどからこの数値を変更できるようにします
let currentAlgorithm = 1; 

document.querySelectorAll('.key').forEach(key => {
    key.addEventListener('mousedown', () => {
        
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        const bufferSize = 1024;
        const node = audioCtx.createScriptProcessor(bufferSize, 1, 1);

        // 各オペレーターのパラメータ（配列のインデックス: 0=OP1, 1=OP2, 2=OP3, 3=OP4）
        const ops = [
            { phase: 9, freq: 0, ml: 1.0, tl: 0.7 }, // OP1
            { phase: 0, freq: 0, ml: 2, tl: 0.8 }, // OP2
            { phase: 0, freq: 0, ml: 1.0, tl: 0.5 }, // OP3
            { phase: 0, freq: 9, ml: 5.0, tl: 0.1 }  // OP4
        ];

        const baseFreq = parseFloat(key.dataset.note); 
        
        // ML（倍率）を基準周波数に適用
        for (let j = 0; j < 4; j++) {
            ops[j].freq = baseFreq * ops[j].ml;
        }

        const noteLenSec = 1;
        const totalSamples = Math.floor(noteLenSec * sampleRate);
        let writtenSamples = 0;

        node.onaudioprocess = (e) => {
            const out = e.outputBuffer.getChannelData(0);
            const len = out.length;

            for (let i = 0; i < len; i++) {
                if (writtenSamples >= totalSamples) {
                    out[i] = 0;
                    continue;
                }

                const t = writtenSamples / sampleRate;
                const env = Math.exp(-t * 3.0); // 簡易エンベロープ

                // 位相の更新
                for (let j = 0; j < 4; j++) {
                    ops[j].phase += (2 * Math.PI * ops[j].freq) / sampleRate;
                }

                const modScale = 3.5; // 変調の深さのベース
                let finalSample = 0;

                // 各オペレーターの素のサイン波にTLを掛けたもの
                // アルゴリズムの結線に応じて、これらに変調（位相のズレ）を加えます
                let s0, s1, s2, s3;

                // 【アルゴリズム分岐処理】
                switch (currentAlgorithm) {
                    case 1:
                        // 1: 直列4段 (4 -> 3 -> 2 -> 1) ※もっともノイジー・複雑な音
                        s3 = Math.sin(ops[3].phase) * ops[3].tl;
                        s2 = Math.sin(ops[2].phase + s3 * modScale) * ops[2].tl;
                        s1 = Math.sin(ops[1].phase + s2 * modScale) * ops[1].tl;
                        s0 = Math.sin(ops[0].phase + s1 * modScale) * ops[0].tl;
                        finalSample = s0;
                        break;

                    case 2:
                        // 2: 2並列の直列2段 ( (4->3) + (2->1) ) ※ベースとブラスなど2要素の合成に便利
                        s3 = Math.sin(ops[3].phase) * ops[3].tl;
                        s2 = Math.sin(ops[2].phase + s3 * modScale) * ops[2].tl; // キャリア1
                        
                        s1 = Math.sin(ops[1].phase) * ops[1].tl;
                        s0 = Math.sin(ops[0].phase + s1 * modScale) * ops[0].tl; // キャリア2
                        
                        finalSample = s2 + s0; // 音を出す2つのキャリアを足す
                        break;

                    case 3:
                        // 3: 3つのモジュレーターが1つのキャリアに変調 ( (4+3+2) -> 1 ) ※非常に分厚い音
                        s3 = Math.sin(ops[3].phase) * ops[3].tl;
                        s2 = Math.sin(ops[2].phase) * ops[2].tl;
                        s1 = Math.sin(ops[1].phase) * ops[1].tl;
                        
                        // 3つの出力をまとめてOP1の位相に変調として加える
                        s0 = Math.sin(ops[0].phase + (s3 + s2 + s1) * modScale) * ops[0].tl;
                        finalSample = s0;
                        break;

                    case 4:
                        // 4: 4並列オルガンモード (4 + 3 + 2 + 1) ※すべてのOPが独立して発音
                        s3 = Math.sin(ops[3].phase) * ops[3].tl;
                        s2 = Math.sin(ops[2].phase) * ops[2].tl;
                        s1 = Math.sin(ops[1].phase) * ops[1].tl;
                        s0 = Math.sin(ops[0].phase) * ops[0].tl;
                        
                        finalSample = s3 + s2 + s1 + s0; // 全員キャリア
                        break;

                    default:
                        s0 = Math.sin(ops[0].phase) * ops[0].tl;
                        finalSample = s0;
                }

                // 最終出力にエンベロープとマスター音量を適用
                const sample = finalSample * env * 0.4; 

                out[i] = sample;
                writtenSamples++;
            }

            if (writtenSamples >= totalSamples) {
                node.disconnect();
            }
        };

        node.connect(audioCtx.destination);
    });
});

</script>
</body>
</html>
