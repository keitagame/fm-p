<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>FM SYNTH</title>
    <style>
        body {  
            height: 100vh; 
            background-color: #ffffff; 
            margin: 0; 
            padding:20px;
            font-family: sans-serif;
        }
        
        /* 追加: コントロールパネルのスタイル */
        .controls {
            background-color: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            max-width: 600px;
        }
        .control-group {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
        }
        .control-group label {
            width: 130px;
            font-size: 14px;
        }
        .control-group input[type="range"] {
            width: 150px;
            margin-right: 15px;
        }
        select {
            padding: 5px;
            font-size: 14px;
        }
        hr {
            border: 0;
            border-top: 1px solid #ddd;
            margin: 15px 0;
        }

        /* 以下、元の鍵盤のスタイル */
        .piano {
            display: flex;
            position: relative;
            border-radius: 8px;
            white-space: nowrap;
        }

        .key {
            width: 40px;
            height: 170px;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 0 0 4px 4px;
            cursor: pointer;
            box-sizing: border-box;
            z-index: 1;
        }

        .key:active {
            background-color: #e0e0e0;
        }

        .key.black {
            width: 24px;
            height: 105px;
            background-color: black;
            border: none;
            margin-left: -12px;
            margin-right: -12px;
            z-index: 2;
        }

        .key.black:active {
            background-color: #444;
        }
    </style>
</head>

<body>
    <!-- 追加: シンセサイザーの操作パネル -->
    <div class="controls">
        <div class="control-group">
            <label for="preset-select"><strong>プリセット:</strong></label>
            <select id="preset-select">
                <option value="default">デフォルト (元の音)</option>
                <option value="bell">ベル (Bell)</option>
                <option value="bass">FMベース (Bass)</option>
                <option value="epiano">エレピ風 (E-Piano)</option>
            </select>
        </div>
        <div class="control-group">
            <label>減衰スピード:</label>
            <input type="range" id="decay" min="0.1" max="10" step="0.1" value="3.0">
        </div>
        <hr>
        <div class="control-group">
            <label>Op1 倍音比率:</label> <input type="range" id="ratio1" min="0.1" max="15" step="0.1" value="2.0">
            <label>Op1 変調量:</label> <input type="range" id="mod10" min="0" max="10" step="0.1" value="2.0">
        </div>
        <div class="control-group">
            <label>Op2 倍音比率:</label> <input type="range" id="ratio2" min="0.1" max="15" step="0.1" value="3.0">
            <label>Op2 変調量:</label> <input type="range" id="mod21" min="0" max="10" step="0.1" value="2.0">
        </div>
        <div class="control-group">
            <label>Op3 倍音比率:</label> <input type="range" id="ratio3" min="0.1" max="15" step="0.1" value="4.0">
            <label>Op3 変調量:</label> <input type="range" id="mod32" min="0" max="10" step="0.1" value="2.0">
        </div>
    </div>
    
    <!-- 鍵盤HTML (元のコードをそのまま使用) -->
    <div class="piano">
        <!-- ──── 【1オクターブ低い】C3 ～ B3 ──── -->
        <div class="key" data-note="130.81"></div>
        <div class="key black" data-note="138.59"></div>
        <div class="key" data-note="146.83"></div>
        <div class="key black" data-note="155.56"></div>
        <div class="key" data-note="164.81"></div>
        <div class="key" data-note="174.61"></div>
        <div class="key black" data-note="185.00"></div>
        <div class="key" data-note="196.00"></div>
        <div class="key black" data-note="207.65"></div>
        <div class="key" data-note="220.00"></div>
        <div class="key black" data-note="233.08"></div>
        <div class="key" data-note="246.94"></div>

        <!-- ──── 【真ん中】C4 ～ B4 ──── -->
        <div class="key" data-note="261.63"></div>
        <div class="key black" data-note="277.18"></div>
        <div class="key" data-note="293.66"></div>
        <div class="key black" data-note="311.13"></div>
        <div class="key" data-note="329.63"></div>
        <div class="key" data-note="349.23"></div>
        <div class="key black" data-note="369.99"></div>
        <div class="key" data-note="392.00"></div>
        <div class="key black" data-note="415.30"></div>
        <div class="key" data-note="440.00"></div>
        <div class="key black" data-note="466.16"></div>
        <div class="key" data-note="493.88"></div>

        <!-- ──── 【1オクターブ高い】C5 ～ B5 ──── -->
        <div class="key" data-note="523.25"></div>
        <div class="key black" data-note="554.37"></div>
        <div class="key" data-note="587.33"></div>
        <div class="key black" data-note="622.25"></div>
        <div class="key" data-note="659.25"></div>
        <div class="key" data-note="698.46"></div>
        <div class="key black" data-note="739.99"></div>
        <div class="key" data-note="783.99"></div>
        <div class="key black" data-note="830.61"></div>
        <div class="key" data-note="880.00"></div>
        <div class="key black" data-note="932.33"></div>
        <div class="key" data-note="987.77"></div>
    </div>

<script>
    // 追加: プリセットの定義
    const presetData = {
        default: { decay: 3.0, ratio1: 2.0, mod10: 2.0, ratio2: 3.0, mod21: 2.0, ratio3: 4.0, mod32: 2.0 }, // 元のコードの数値[cite: 1]
        bell:    { decay: 1.2, ratio1: 2.1, mod10: 4.0, ratio2: 3.4, mod21: 2.5, ratio3: 5.8, mod32: 1.0 }, // 金属的な非整数倍音
        bass:    { decay: 3.0, ratio1: 1.0, mod10: 2.5, ratio2: 2.0, mod21: 3.2, ratio3: 3.0, mod32: 3.0 }, // 低く太い音
        epiano:  { decay: 2.0, ratio1: 1.0, mod10: 1.2, ratio2: 5.0, mod21: 1.5, ratio3: 14.0, mod32: 0.5 } // キラキラしたエレピ
    };

    // 追加: プリセット切り替え時の処理
    const inputs = ['decay', 'ratio1', 'mod10', 'ratio2', 'mod21', 'ratio3', 'mod32'];
    document.getElementById('preset-select').addEventListener('change', (e) => {
        const p = presetData[e.target.value];
        inputs.forEach(id => {
            document.getElementById(id).value = p[id];
        });
    });

    // 元のオーディオ処理のベース[cite: 1]
    const sampleRate = 44100;
    let audioCtx = null;

    document.querySelectorAll('.key').forEach(key => {
        key.addEventListener('mousedown', () => {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();

            const bufferSize = 1024;
            const node = audioCtx.createScriptProcessor(bufferSize, 1, 1);

            const ops = [];
            for (let i = 0; i < 4; i++) {
                ops.push({ phase: 0, freq: 0, amp: 0 });
            }

            // スライダーから現在の値を取得するように変更
            const v_decay = parseFloat(document.getElementById('decay').value);
            const v_r1 = parseFloat(document.getElementById('ratio1').value);
            const v_m10 = parseFloat(document.getElementById('mod10').value);
            const v_r2 = parseFloat(document.getElementById('ratio2').value);
            const v_m21 = parseFloat(document.getElementById('mod21').value);
            const v_r3 = parseFloat(document.getElementById('ratio3').value);
            const v_m32 = parseFloat(document.getElementById('mod32').value);

            const baseFreq = parseFloat(key.dataset.note); 
            
            // 倍音比率をスライダーの値から設定
            ops[0].freq = baseFreq * 1.0;
            ops[1].freq = baseFreq * v_r1;
            ops[2].freq = baseFreq * v_r2;
            ops[3].freq = baseFreq * v_r3;

            const noteLenSec = 1.5; // 少し余韻を長めに変更
            const totalSamples = Math.floor(noteLenSec * sampleRate);
            let writtenSamples = 0;

            node.onaudioprocess = (e) => {
                const out = e.outputBuffer.getChannelData(0);
                const len = out.length;

                for (let i = 0; i < len; i++) {
                    if (writtenSamples >= totalSamples) {
                        out[i] = 0;
                        continue;
                    }

                    const t = writtenSamples / sampleRate;
                    
                    // エンベロープの減衰をスライダーの値(v_decay)に変更
                    const env = Math.exp(-t * v_decay); 

                    for (let j = 0; j < 4; j++) {
                        const op = ops[j];
                        const phaseInc = 2 * Math.PI * op.freq / sampleRate;
                        op.phase += phaseInc;
                    }

                    // 直列アルゴリズムの変調量をスライダーの値に変更
                    const op3 = Math.sin(ops[3].phase) * 1.0;
                    const op2 = Math.sin(ops[2].phase + op3 * v_m32);   
                    const op1 = Math.sin(ops[1].phase + op2 * v_m21);
                    const op0 = Math.sin(ops[0].phase + op1 * v_m10);

                    const sample = op0 * env * 0.4; 

                    out[i] = sample;
                    writtenSamples++;
                }

                if (writtenSamples >= totalSamples) {
                    node.disconnect();
                }
            };

            node.connect(audioCtx.destination);
        });
    });
</script>
</body>
</html>
